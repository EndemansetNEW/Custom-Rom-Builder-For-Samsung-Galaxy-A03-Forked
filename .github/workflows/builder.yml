name: Custom Rom Builder Samsung Galaxy A03
permissions:
  contents: write
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
        GSI:
              description: 'GSI Image Direct Link'
              required: true
              default: 'https://sourceforge.net/projects/andyyan-gsi/files/lineage-22-light/lineage-22.2-20250621-UNOFFICIAL-gsi_arm64_vN.img.gz'        
        NAME:
              description: 'Rom Name'
              required: true
              default: 'aosp-arm64-ab-gapps-14.0-a03.7z'
        VERSION:
              description: 'Baseband Version'
              required: true
              default: 'A035FXXS9CYG1'
        VENDOR:
              description: 'Enter Direct Link Of Your Version Vendor'
              required: true
              default: 'https://download1649.mediafire.com/h76id3vbh9rg-FF5iQy0UsSXhAb6iJPukW4SVN5x2hz2tZoKee243_g8hfWTD_HQDnIST7anF1RrNa-yoOgIITbjI8Dvvf5XELgw50RghG-O3tpeqj7TQJZIhG30h84zGlJ3VeXYXbiXovhnUOR9dS6GUrPO7sC8sgThW5f3dc5q/js7lzvk4ldnbd07/vendor.img'

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y zip xz-utils unzip p7zip-full wget android-sdk-libsparse-utils
        
    - name: Installing Tools
      run: |
        git clone https://github.com/Exynos-nigg/lpunpack-lpmake-mirror.git lpbinary
        cd lpbinary
        bash install.sh

    - name: Downloading Your GSI And Extracting
      run: |
        cd lpbinary/binary
        wget ${{ github.event.inputs.GSI }}
        mkdir sys
        mv *.gz sys/
        cd sys
        gunzip *.gz
        
        # Pass the extracted raw system partition directly back up into the build folder
        mv *.img ../system.img
        
        cd ..

    - name: Preparing Files
      run: |
        cd lpbinary/binary
        
        # Download everything cleanly as direct raw images—no tool conversions needed!
        wget ${{ github.event.inputs.VENDOR }} -O vendor.img
        wget https://download1588.mediafire.com/v6411ro4x4og-Y1lqtXyTvJLMXOO95cNMAKgDqOPhSs_CiGyBtRxtZbDjHRInFaUaBi-jz6gmBjYXTL3v_MvVRjkDU1-lF1Dy_zDoKsdujHDWlbrabBy_qaeMpQrcw-zAjyQGg1T3mh8IyIFsbeZCGu0dQLHKSs_v-uWQBopHYa5/1ctglyzzucthqev/product.img -O product.img
        wget https://download1582.mediafire.com/r98cpcfnmxkgHGVOJ317FH2hUhTNdxvM4crIgygZquW1YIx5Pdls7TlVX9qdliHB-flZ8s2hdHFogQaXkDuLIpqh9wRJ7pqvQ9-H91teAn3UvhL4N6C4KWy8_2cOw78iX1Y6wLP4nBGrmbDyx1L_UF0i60rlLSih1htO7SBBzcNF/2xbuj6f2fm82sm7/system_ext.img -O system_ext.img
        
    - name: Packing
      run: |
        cd lpbinary/binary
        ./lpmake --metadata-size 65536 --super-name super --metadata-slots 3 --device super:6763315200 --group main:6761218048 --partition system:readonly:$(ls -nl system.img | awk '{print $5}'):main --image system=system.img --partition vendor:readonly:$(ls -nl vendor.img | awk '{print $5}'):main --image vendor=vendor.img --partition product:readonly:$(ls -nl product.img | awk '{print $5}'):main --image product=product.img --partition system_ext:readonly:$(ls -nl system_ext.img | awk '{print $5}'):main --image system_ext=system_ext.img --sparse --output super.img

    - name: Creating tar and compressing to 7z
      run: |
        cd lpbinary/binary
        tar -cvf super.tar super.img
        rm -rf super.img
        7z a ${{ github.event.inputs.NAME }} super.tar
        rm -rf super.tar

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: lpbinary/binary/${{ github.event.inputs.NAME }}
        name: ${{ github.event.inputs.NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
            Device: Samsung Galaxy A03
            Version: ${{ github.event.inputs.VERSION }}
            Rom Name: ${{ github.event.inputs.NAME }}
            Flash: Extract the 7z file and flash through ODIN in AP Section.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
