name: Custom Rom Builder Samsung Galaxy A03
permissions:
  contents: write
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
        GSI:
              description: 'GSI Image Direct Link'
              required: true
              default: 'https://sourceforge.net/projects/andyyan-gsi/files/lineage-22-light/lineage-22.2-20250621-UNOFFICIAL-gsi_arm64_vN.img.gz'        
        NAME:
              description: 'Rom Name'
              required: true
              default: 'aosp-arm64-ab-gapps-14.0-a03.7z'
        VERSION:
              description: 'Baseband Version'
              required: true
              default: 'A035FXXS9CYG1'
        VENDOR:
              description: 'Enter Direct Link Of Your Version Vendor'
              required: true
              default: 'https://download1649.mediafire.com/i4ytk58ssnegwnSPoKgpwH7K4N5RCVVKIBC2Z9PPLCxchcTO_k3r3YLkmQKmyUCol_mS1EsTbav0NCCTois_hm6QAk-xbte1BVWOgCIr1RNSlbxGA5k6mIb1KwEQzn5TMoD8a4nbWtFRMbiT1jTHkVDsc9lptGUopqQuwvpcfXAh/js7lzvk4ldnbd07/vendor.img'

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y zip xz-utils unzip p7zip-full wget android-sdk-libsparse-utils
        
    - name: Installing Tools
      run: |
        git clone https://github.com/Exynos-nigg/lpunpack-lpmake-mirror.git lpbinary
        cd lpbinary
        bash install.sh

    - name: Downloading Your GSI And Extracting
      run: |
        cd lpbinary/binary
        wget ${{ github.event.inputs.GSI }}
        mkdir sys
        mv *.gz sys/
        cd sys
        gunzip *.gz
        
        # Pass the extracted raw system partition directly back up into the build folder
        mv *.img ../system.img
        
        cd ..

    - name: Preparing Files
      run: |
        cd lpbinary/binary
        
        # Download everything cleanly as direct raw images—no tool conversions needed!
        wget ${{ github.event.inputs.VENDOR }} -O vendor.img
        wget https://download1588.mediafire.com/ica6dzcbp4lgzzAa-IaOGvBH2d6wA7SthVtCZ_Pf00ILY0PzqEVZ7-6X70tL1SDiMQiagoNulVHtoSirNbTusEP9siurGy8qG2xO1dKj0QcwV1-IsERObUQltXl13T9UUSk5VbrogIZJaf4_tAOy-1YAZPPP4GjD1SZOXvmjv_kz/1ctglyzzucthqev/product.img -O product.img
        wget https://download1582.mediafire.com/ja14gk678a0gqqaaLg4oYjjp4S83wGs3rwZxd78ndABdpIE9Srd5WjkvngENQrozBkoEl0TvzHLLKmn0aWlrCC1AlaeUy9lMKpdur_K_pDNXSBfxgWfadFnuKGiRmcRJ6g4B_xQZuF57mtCRBrE-XrbShqOINlryts4793c-K81w/2xbuj6f2fm82sm7/system_ext.img -O system_ext.img
        
    - name: Packing
      run: |
        cd lpbinary/binary
        ./lpmake --metadata-size 65536 --super-name super --metadata-slots 2 --device super:6763315200 --group main:6761218048 --partition system:readonly:$(ls -nl system.img | awk '{print $5}'):main --image system=system.img --partition vendor:readonly:$(ls -nl vendor.img | awk '{print $5}'):main --image vendor=vendor.img --partition product:readonly:$(ls -nl product.img | awk '{print $5}'):main --image product=product.img --partition system_ext:readonly:$(ls -nl system_ext.img | awk '{print $5}'):main --image system_ext=system_ext.img --sparse --output super.img

    - name: Creating tar and compressing to 7z
      run: |
        cd lpbinary/binary
        tar -cvf super.tar super.img
        rm -rf super.img
        7z a ${{ github.event.inputs.NAME }} super.tar
        rm -rf super.tar

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: lpbinary/binary/${{ github.event.inputs.NAME }}
        name: ${{ github.event.inputs.NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
            Device: Samsung Galaxy A03
            Version: ${{ github.event.inputs.VERSION }}
            Rom Name: ${{ github.event.inputs.NAME }}
            Flash: Extract the 7z file and flash through ODIN in AP Section.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
