name: Custom Rom Builder Samsung Galaxy A03
permissions:
  contents: write
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
        GSI:
              description: 'GSI Image Direct Link'
              required: true
              default: 'https://sourceforge.net/projects/andyyan-gsi/files/lineage-21-td/lineage-21.0-20250621-UNOFFICIAL-arm64_bvS.img.gz'        
        NAME:
              description: 'Rom Name'
              required: true
              default: 'aosp-arm64-ab-gapps-14.0-a03.7z'
        VERSION:
              description: 'Baseband Version'
              required: true
              default: 'A035FXXS9CYG1'
        VENDOR:
              description: 'Enter Direct Link Of Your Version Vendor'
              required: true
              default: 'https://download1649.mediafire.com/0v09t3rmmubgRUoJZAGftV0wGlLuKWqm_9vn3YmtIW0kZ0KBDS63IfLt3kkTl0C2YxIRgMrUw6EeXORvJ_4t3V9B1Q6ueOj4FwuXReFwhWAsTi_uqLn0GEIOeeynqCiTkiE_rhJfpJL3NiEfLAIK3ep0oTI8EIYGcXP3xo9NfzYs/js7lzvk4ldnbd07/vendor.img'

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y zip xz-utils unzip p7zip-full wget android-sdk-libsparse-utils
        
    - name: Installing Tools
      run: |
        git clone https://github.com/Exynos-nigg/lpunpack-lpmake-mirror.git lpbinary
        cd lpbinary
        bash install.sh

    - name: Downloading Your GSI And Extracting
      run: |
        cd lpbinary/binary
        wget ${{ github.event.inputs.GSI }}
        mkdir sys
        mv *.gz sys/
        cd sys
        gunzip *.gz
        
        # Pass the extracted raw system partition directly back up into the build folder
        mv *.img ../system.img
        
        cd ..

    - name: Preparing Files
      run: |
        cd lpbinary/binary
        
        # Download everything cleanly as direct raw images—no tool conversions needed!
        wget ${{ github.event.inputs.VENDOR }} -O vendor.img
        wget https://download1588.mediafire.com/to18t1z72kigNKPAExXw6-OuFqPDs4dluTFZntqW3waaUcA1ap6G94v4bDQdQGnB4rPy6FtDzdJeP0KYc96bdVVG_r47UFMsJEUIBAuKzkB_bJ1DpcjUZOCiFQKRoF3UEt8gVpzHQmH3EQmCFR2F8V8fukj4Qnl8gimaz3aFq9a6/1ctglyzzucthqev/product.img -O product.img
        wget https://download1582.mediafire.com/hjydw5ekyycgt4z7-HgfS21WJlHLaS9H-wgan8fFRQYnlZC_eji_OHQbgSy-YgF8sazIShpvTskqv_TFz8YGL2xQE_Mo3_yMtOWHpyZZ7g-OlcTKTQcF3xyt8VCo4ghf6BB47GdxpLQIYXbTickRqh_uJcF6GW-I6x0LeySYxzW6/2xbuj6f2fm82sm7/system_ext.img -O system_ext.img
        
    - name: Packing
      run: |
        cd lpbinary/binary
        ./lpmake --metadata-size 65536 --super-name super --metadata-slots 3 --device super:6763315200 --group main:6761218048 --partition system:readonly:$(ls -nl system.img | awk '{print $5}'):main --image system=system.img --partition vendor:readonly:$(ls -nl vendor.img | awk '{print $5}'):main --image vendor=vendor.img --partition product:readonly:$(ls -nl product.img | awk '{print $5}'):main --image product=product.img --partition system_ext:readonly:$(ls -nl system_ext.img | awk '{print $5}'):main --image system_ext=system_ext.img --sparse --output super.img

    - name: Creating tar and compressing to 7z
      run: |
        cd lpbinary/binary
        tar -cvf super.tar super.img
        rm -rf super.img
        7z a ${{ github.event.inputs.NAME }} super.tar
        rm -rf super.tar

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: lpbinary/binary/${{ github.event.inputs.NAME }}
        name: ${{ github.event.inputs.NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
            Device: Samsung Galaxy A03
            Version: ${{ github.event.inputs.VERSION }}
            Rom Name: ${{ github.event.inputs.NAME }}
            Flash: Extract the 7z file and flash through ODIN in AP Section.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
